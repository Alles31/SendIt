<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last?</title>

    <style>
        body{
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:500px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            box-sizing:border-box;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
        }

        #message{
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h3>Maybe this is the last journey, so I gave you the secret message.</h3>

    <p>Enter the secret key.</p>

    <input id="key" type="text" placeholder="...">

    <br>

    <button onclick="check()">Continue</button>

    <div id="message"></div>

</div>

<script>

function check(){

    const input = document.getElementById("key")
        .value
        .trim()
        .toLowerCase();

    const message = document.getElementById("message");

    if(input === "lastm4ssagef0ryou"){

        message.innerHTML = `
            <p>One last page remains.</p>
            <p>Following the trail...</p>
        `;

        setTimeout(() => {
            window.location.href = "LINK_WEBSITE_KETIGA";
        }, 2500);

        return;
    }

    message.innerHTML = `
        <p>Not this one.</p>
    `;
}

document.getElementById("key").addEventListener("keypress", function(event){
    if(event.key === "Enter"){
        event.preventDefault();
        check();
    }
});

</script>

</body>
</html>
